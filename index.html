<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanOps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.1/Recharts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#F7F8FA;color:#1B2A4A}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef} = React;
const {BarChart,Bar,ComposedChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend} = Recharts;

const C={bg:"#F7F8FA",surface:"#FFFFFF",navy:"#1B2A4A",coral:"#E8614A",mint:"#2ECC9A",amber:"#F0A500",muted:"#8A94A6",border:"#E4E8F0",text:"#1B2A4A",textSoft:"#5A6478"};
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const today=new Date();
const fmt=dt=>dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtS=dt=>dt.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const isToday=dt=>{const n=new Date();return dt.getDate()===n.getDate()&&dt.getMonth()===n.getMonth()&&dt.getFullYear()===n.getFullYear();};
const sameDay=(a,b)=>a.getDate()===b.getDate()&&a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear();
const gbp=v=>"£"+v.toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0});
const dd=(n,h=11)=>{const dt=new Date(today);dt.setDate(dt.getDate()+n);dt.setHours(h,0,0,0);return dt;};

function pill(s){
 const m={pending:[C.amber,"#FFF8E7"],"in-progress":[C.navy,"#EEF1F7"],complete:[C.mint,"#E8FAF4"],cancelled:[C.muted,"#F4F5F7"]};
 const [fg,bg]=m[s]||[C.muted,"#F4F5F7"];
 return {color:fg,background:bg,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700,textTransform:"uppercase",display:"inline-block"};
}

function Btn({onClick,children,secondary,small}){
 return <button onClick={onClick} style={{padding:small?"6px 14px":"9px 18px",borderRadius:10,border:secondary?`1.5px solid ${C.border}`:"none",background:secondary?C.surface:C.navy,color:secondary?C.text:"#fff",fontSize:small?12:14,fontWeight:600,whiteSpace:"nowrap"}}>{children}</button>;
}
function Field({label,value,onChange,placeholder}){
 return <div><label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>{label}</label><input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg,outline:"none",boxSizing:"border-box"}}/></div>;
}
function Modal({onClose,title,children}){
 return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:24}}>
   <div style={{background:C.surface,borderRadius:20,padding:"28px 32px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 32px 80px rgba(0,0,0,0.25)"}}>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
       <div style={{fontWeight:800,fontSize:18}}>{title}</div>
       <button onClick={onClose} style={{background:C.bg,border:"none",borderRadius:8,width:32,height:32,fontSize:16}}>{String.fromCharCode(10005)}</button>
     </div>
     {children}
   </div>
 </div>;
}
function Toast({msg,type}){
 const bg=type==="error"?C.coral:C.mint;
 return <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"12px 24px",borderRadius:12,fontWeight:600,fontSize:14,zIndex:999,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",whiteSpace:"nowrap"}}>{msg}</div>;
}
function Empty({icon,text}){return <div style={{textAlign:"center",padding:"48px 0",color:C.muted}}><div style={{fontSize:36,marginBottom:12}}>{icon}</div><div style={{fontSize:14}}>{text}</div></div>;}
function KPI({label,value,sub,accent,icon}){
 return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 20px"}}>
   <div style={{fontSize:20,marginBottom:8}}>{icon}</div>
   <div style={{fontSize:24,fontWeight:800,color:accent||C.text}}>{value}</div>
   {sub&&<div style={{fontSize:13,color:C.muted,fontWeight:600}}>{sub}</div>}
   <div style={{fontSize:12,color:C.muted,marginTop:4}}>{label}</div>
 </div>;
}
function Tabs({value,onChange,options}){
 return <div style={{display:"flex",gap:4,background:C.bg,borderRadius:10,padding:4}}>
   {options.map(o=><button key={o.id} onClick={()=>onChange(o.id)} style={{padding:"6px 14px",borderRadius:8,border:"none",fontSize:13,fontWeight:600,background:value===o.id?C.surface:"transparent",color:value===o.id?C.text:C.muted,boxShadow:value===o.id?"0 1px 4px rgba(0,0,0,0.08)":"none"}}>{o.label}</button>)}
 </div>;
}
function PH({title,subtitle,children}){
 return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:28}}>
   <div><h1 style={{margin:0,fontSize:26,fontWeight:800,color:C.text}}>{title}</h1>{subtitle&&<div style={{color:C.muted,fontSize:14,marginTop:4}}>{subtitle}</div>}</div>
   {children&&<div style={{display:"flex",gap:10}}>{children}</div>}
 </div>;
}
function ST({children}){return <div style={{fontSize:13,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>{children}</div>;}

function Login({pin,setPin,pinErr,setPinErr,cleaners,setRole,setCleaner}){
 const digits=["1","2","3","4","5","6","7","8","9","","0","←"];
 const handle=dg=>{
   if(dg==="←"){setPin(p=>p.slice(0,-1));setPinErr("");return;}
   if(dg==="")return;
   const next=pin+dg;setPin(next);setPinErr("");
   if(next.length===4){
     if(next==="0000"){setRole("manager");return;}
     const c=cleaners.find(c=>c.pin===next);
     if(c){setRole("cleaner");setCleaner(c);return;}
     setTimeout(()=>{setPin("");setPinErr("Incorrect PIN — try again");},300);
   }
 };
 return <div style={{minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
   <div style={{marginBottom:32,textAlign:"center"}}>
     <div style={{fontSize:13,letterSpacing:"0.18em",color:C.coral,fontWeight:700,textTransform:"uppercase",marginBottom:8}}>CleanOps</div>
     <div style={{fontSize:28,fontWeight:700,color:"#fff"}}>Enter your PIN</div>
     <div style={{color:"#8A99B8",marginTop:6,fontSize:14}}>Manager: 0000 · Cleaners use their own PIN</div>
   </div>
   <div style={{background:"#fff",borderRadius:20,padding:"32px 28px",width:280,boxShadow:"0 24px 64px rgba(0,0,0,0.28)"}}>
     <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:28}}>
       {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?C.navy:C.border}}/>)}
     </div>
     {pinErr&&<div style={{color:C.coral,fontSize:13,textAlign:"center",marginBottom:14}}>{pinErr}</div>}
     <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
       {digits.map((dg,i)=><button key={i} onClick={()=>handle(dg)} style={{height:56,borderRadius:12,border:"none",background:dg===""?"transparent":C.bg,color:C.navy,fontSize:22,fontWeight:600}}>{dg}</button>)}
     </div>
   </div>
 </div>;
}

function Sidebar({tab,setTab,onLogout}){
 const items=[{id:"diary",label:"Booking Diary",icon:"📅"},{id:"cleans",label:"Cleans",icon:"🧹"},{id:"earnings",label:"Earnings",icon:"💷"},{id:"properties",label:"Properties",icon:"🏠"},{id:"team",label:"Team",icon:"👥"},{id:"settings",label:"Settings",icon:"⚙️"}];
 return <div style={{position:"fixed",left:0,top:0,bottom:0,width:220,background:C.navy,display:"flex",flexDirection:"column",padding:"24px 0"}}>
   <div style={{padding:"0 20px 28px",borderBottom:"1px solid #2C3E5D"}}>
     <div style={{fontSize:11,letterSpacing:"0.18em",color:C.coral,fontWeight:700,textTransform:"uppercase"}}>CleanOps</div>
     <div style={{color:"#fff",fontWeight:700,fontSize:15,marginTop:2}}>Manager</div>
   </div>
   <nav style={{flex:1,padding:"16px 12px"}}>
     {items.map(item=><button key={item.id} onClick={()=>setTab(item.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:10,border:"none",marginBottom:2,background:tab===item.id?"rgba(255,255,255,0.1)":"transparent",color:tab===item.id?"#fff":"#8A99B8",fontSize:14,fontWeight:tab===item.id?600:400,textAlign:"left"}}>
       <span>{item.icon}</span>{item.label}
     </button>)}
   </nav>
   <div style={{padding:"0 12px"}}>
     <button onClick={onLogout} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"none",background:"transparent",color:"#8A99B8",fontSize:14,textAlign:"left"}}>🚪 Log out</button>
   </div>
 </div>;
}

function DiaryView({properties,bookings,cleans,cleaners,setCleans,setBookings,showToast}){
 const [wo,setWo]=useState(0);
 const [sel,setSel]=useState(null);
 const ws=new Date(today);ws.setDate(today.getDate()-today.getDay()+1+wo*7);
 const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
 const todayOuts=bookings.filter(b=>sameDay(b.checkout,today));
 const upcoming=bookings.filter(b=>b.checkout>today&&b.checkout<=dd(7)).sort((a,b)=>a.checkout-b.checkout);
 function notify(b){
   const p=properties.find(x=>x.id===b.propertyId);
   console.log("[SMS] Checkout:",fmt(b.checkout),properties.find(x=>x.id===b.propertyId)?.name);
   setBookings(bs=>bs.map(x=>x.id===b.id?{...x,notified:true}:x));
   showToast("Cleaners notified for "+p?.name);
 }
 function schedClean(b){
   if(cleans.find(c=>c.bookingId===b.id)){showToast("Clean already scheduled");return;}
   const p=properties.find(x=>x.id===b.propertyId);
   const ac=cleaners.find(c=>c.assignedProperties.includes(b.propertyId));
   setCleans(cs=>[...cs,{id:"cl"+Date.now(),bookingId:b.id,propertyId:b.propertyId,cleanerId:ac?.id||null,date:b.checkout,status:"pending",notes:""}]);
   showToast("Clean scheduled for "+p?.name);
 }
 return <div>
   <PH title="Booking Diary" subtitle={fmtS(days[0])+" – "+fmtS(days[6])}>
     <div style={{display:"flex",gap:8}}>
       <Btn onClick={()=>setWo(w=>w-1)} secondary>← Prev</Btn>
       <Btn onClick={()=>setWo(0)} secondary>Today</Btn>
       <Btn onClick={()=>setWo(w=>w+1)} secondary>Next →</Btn>
     </div>
   </PH>
   {todayOuts.length>0&&<div style={{background:"#FFF3F1",border:`1px solid ${C.coral}`,borderRadius:12,padding:"14px 18px",marginBottom:24,display:"flex",alignItems:"center",gap:12}}>
     <span style={{fontSize:20}}>🔔</span>
     <div><div style={{fontWeight:700,color:C.coral,fontSize:14}}>Checkouts today</div>
     <div style={{color:C.textSoft,fontSize:13}}>{todayOuts.map(b=>{const p=properties.find(x=>x.id===b.propertyId);return b.guest+" – "+(p?.name||"");}).join(" · ")}</div></div>
   </div>}
   <div style={{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:32}}>
     <div style={{display:"grid",gridTemplateColumns:"140px repeat(7,1fr)",borderBottom:`1px solid ${C.border}`}}>
       <div style={{padding:"12px 16px",background:"#FAFBFD",fontSize:12,color:C.muted,fontWeight:600}}>Property</div>
       {days.map((day,i)=><div key={i} style={{padding:"10px 8px",textAlign:"center",background:isToday(day)?"#EEF6FF":"#FAFBFD",borderLeft:`1px solid ${C.border}`}}>
         <div style={{fontSize:11,color:C.muted,textTransform:"uppercase"}}>{day.toLocaleDateString("en-GB",{weekday:"short"})}</div>
         <div style={{fontWeight:isToday(day)?800:500,fontSize:15,color:isToday(day)?C.coral:C.text}}>{day.getDate()}</div>
       </div>)}
     </div>
     {properties.length===0&&<div style={{padding:40,textAlign:"center",color:C.muted}}>Add properties to see the diary</div>}
     {properties.map(prop=><div key={prop.id} style={{display:"grid",gridTemplateColumns:"140px repeat(7,1fr)",borderBottom:`1px solid ${C.border}`}}>
       <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:8}}>
         <div style={{width:8,height:8,borderRadius:"50%",background:prop.color,flexShrink:0}}/>
         <span style={{fontSize:12,fontWeight:600}}>{prop.name}</span>
       </div>
       {days.map((day,i)=>{
         const bks=bookings.filter(b=>b.propertyId===prop.id&&b.checkin<=day&&b.checkout>day);
         const isOut=bookings.some(b=>b.propertyId===prop.id&&sameDay(b.checkout,day));
         const isIn=bookings.some(b=>b.propertyId===prop.id&&sameDay(b.checkin,day));
         return <div key={i} onClick={()=>bks[0]&&setSel(bks[0])} style={{borderLeft:`1px solid ${C.border}`,background:isToday(day)?"#FAFEFF":"transparent",minHeight:56,padding:4,cursor:bks[0]?"pointer":"default",position:"relative"}}>
           {bks.map(b=><div key={b.id} style={{background:prop.color+"22",borderLeft:`3px solid ${prop.color}`,borderRadius:4,padding:"3px 6px",fontSize:11,fontWeight:600,color:prop.color,marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{b.guest.split(" ")[0]}</div>)}
           {isOut&&<div style={{position:"absolute",bottom:3,right:4,fontSize:9,color:C.coral,fontWeight:700}}>OUT</div>}
           {isIn&&<div style={{position:"absolute",top:3,right:4,fontSize:9,color:C.mint,fontWeight:700}}>IN</div>}
         </div>;
       })}
     </div>)}
   </div>
   <ST>Upcoming checkouts — next 7 days</ST>
   <div style={{display:"flex",flexDirection:"column",gap:10}}>
     {upcoming.length===0&&<Empty icon="🏖️" text="No checkouts in the next 7 days"/>}
     {upcoming.map(b=>{
       const prop=properties.find(p=>p.id===b.propertyId);
       const hasClean=cleans.some(c=>c.bookingId===b.id);
       return <div key={b.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
         <div style={{width:10,height:10,borderRadius:"50%",background:prop?.color}}/>
         <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{b.guest}</div><div style={{color:C.textSoft,fontSize:13}}>{prop?.name} · Checkout {fmt(b.checkout)}</div></div>
         {hasClean?<span style={pill("pending")}>Clean scheduled</span>:<Btn onClick={()=>schedClean(b)} secondary small>+ Schedule clean</Btn>}
         {!b.notified?<Btn onClick={()=>notify(b)} small>Notify cleaners</Btn>:<span style={{...pill("complete"),fontSize:11}}>✓ Notified</span>}
       </div>;
     })}
   </div>
   {sel&&<Modal onClose={()=>setSel(null)} title="Booking details">
     <div style={{display:"flex",flexDirection:"column",gap:16}}>
       <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
         {[["Guest",sel.guest],["Property",properties.find(p=>p.id===sel.propertyId)?.name],["Check-in",fmt(sel.checkin),C.mint],["Checkout",fmt(sel.checkout),C.coral]].map(([l,v,a])=><div key={l} style={{background:C.bg,borderRadius:10,padding:"10px 14px"}}><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:2}}>{l}</div><div style={{fontSize:14,fontWeight:700,color:a||C.text}}>{v}</div></div>)}
       </div>
       {!cleans.find(c=>c.bookingId===sel.id)&&<Btn onClick={()=>{schedClean(sel);setSel(null);}}>+ Schedule clean</Btn>}
       {!sel.notified&&<Btn onClick={()=>{notify(sel);setSel(null);}} secondary>📲 Notify cleaners</Btn>}
     </div>
   </Modal>}
 </div>;
}

function CleansView({cleans,setCleans,properties,cleaners,bookings,showToast}){
 const [filter,setFilter]=useState("all");
 const list=cleans.filter(c=>filter==="all"||c.status===filter).sort((a,b)=>a.date-b.date);
 return <div>
   <PH title="Cleans" subtitle={cleans.length+" total"}>
     <Tabs value={filter} onChange={setFilter} options={[{id:"all",label:"All"},{id:"pending",label:"Pending"},{id:"in-progress",label:"In progress"},{id:"complete",label:"Complete"}]}/>
   </PH>
   <div style={{display:"flex",flexDirection:"column",gap:10}}>
     {list.length===0&&<Empty icon="🧹" text="No cleans"/>}
     {list.map(c=>{
       const prop=properties.find(p=>p.id===c.propertyId);
       const clnr=cleaners.find(x=>x.id===c.cleanerId);
       const bk=bookings.find(b=>b.id===c.bookingId);
       return <div key={c.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",gap:14}}>
         <div style={{width:10,height:10,borderRadius:"50%",background:prop?.color,flexShrink:0}}/>
         <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{prop?.name}</div><div style={{color:C.textSoft,fontSize:13}}>{fmtS(c.date)} · {clnr?.name||"Unassigned"}{bk?" · after "+bk.guest:""}</div></div>
         <span style={pill(c.status)}>{c.status}</span>
         {c.status==="pending"&&<Btn onClick={()=>{setCleans(cs=>cs.map(x=>x.id===c.id?{...x,status:"in-progress"}:x));showToast("Started");}} small secondary>Start</Btn>}
         {c.status==="in-progress"&&<Btn onClick={()=>{setCleans(cs=>cs.map(x=>x.id===c.id?{...x,status:"complete"}:x));showToast("Complete!");}} small>✓ Done</Btn>}
       </div>;
     })}
   </div>
 </div>;
}

function EarningsView({properties,earnings,setEarnings,showToast}){
 const [yr,setYr]=useState(today.getFullYear());
 const [view,setView]=useState("overview");
 const [selP,setSelP]=useState(properties[0]?.id||"");
 const [showAdd,setShowAdd]=useState(false);
 const [form,setForm]=useState({propertyId:properties[0]?.id||"",year:today.getFullYear(),month:today.getMonth(),revenue:"",nights:""});
 const getE=(pid,y,m)=>earnings.find(e=>e.propertyId===pid&&e.year===y&&e.month===m);
 const ytd=earnings.filter(e=>e.year===yr).reduce((s,e)=>s+e.revenue,0);
 const allYears=[...new Set([today.getFullYear(),...earnings.map(e=>e.year)])].sort();
 const bestM=MONTHS.map((_,mi)=>({mi,rev:earnings.filter(e=>e.year===yr&&e.month===mi).reduce((s,e)=>s+e.revenue,0)})).reduce((b,m)=>m.rev>b.rev?m:b,{mi:0,rev:0});
 const chartData=MONTHS.map((name,mi)=>{const row={month:name};properties.forEach(p=>{const e=getE(p.id,yr,mi);row[p.id]=e?e.revenue:0;});return row;});
 const occData=MONTHS.map((name,mi)=>{const e=getE(selP,yr,mi);return {month:name,revenue:e?e.revenue:0,occupancy:e?Math.round((e.nights/dim(yr,mi))*100):0};});
 function addManual(){
   const rev=parseFloat(form.revenue),nts=parseInt(form.nights);
   if(!rev||!nts){showToast("Enter valid revenue and nights","error");return;}
   const ex=getE(form.propertyId,Number(form.year),Number(form.month));
   if(ex){setEarnings(es=>es.map(e=>e.id===ex.id?{...e,revenue:rev,nights:nts}:e));}
   else{setEarnings(es=>[...es,{id:"e"+Date.now(),propertyId:form.propertyId,year:Number(form.year),month:Number(form.month),revenue:rev,nights:nts,source:"manual"}]);}
   showToast("Earnings saved");setShowAdd(false);
 }
 return <div>
   <PH title="Earnings" subtitle={yr+" · "+properties.length+" properties"}>
     <div style={{display:"flex",gap:8}}>
       <select value={yr} onChange={e=>setYr(Number(e.target.value))} style={{padding:"8px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.surface}}>
         {allYears.map(y=><option key={y} value={y}>{y}</option>)}
       </select>
       <Btn onClick={()=>setShowAdd(true)}>+ Add earnings</Btn>
     </div>
   </PH>
   <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16,marginBottom:32}}>
     <KPI label="YTD Revenue" value={gbp(ytd)} accent={C.mint} icon="💷"/>
     <KPI label="Best month" value={MONTHS[bestM.mi]} sub={gbp(bestM.rev)} accent={C.coral} icon="🏆"/>
     <KPI label="Properties" value={properties.length} icon="🏠"/>
     <KPI label="Avg/property" value={gbp(properties.length?Math.round(ytd/properties.length):0)} icon="📊"/>
   </div>
   <div style={{marginBottom:24}}><Tabs value={view} onChange={setView} options={[{id:"overview",label:"Portfolio overview"},{id:"property",label:"Property deep-dive"}]}/></div>
   {view==="overview"&&<>
     <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px 24px 16px",marginBottom:24}}>
       <div style={{fontWeight:700,fontSize:15,marginBottom:20}}>Monthly revenue by property</div>
       {properties.length===0?<Empty icon="📊" text="Add properties and earnings to see chart"/>:
       <ResponsiveContainer width="100%" height={260}>
         <BarChart data={chartData}>
           <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
           <XAxis dataKey="month" tick={{fontSize:12,fill:C.muted}} axisLine={false} tickLine={false}/>
           <YAxis tickFormatter={v=>"£"+(v/1000).toFixed(0)+"k"} tick={{fontSize:12,fill:C.muted}} axisLine={false} tickLine={false}/>
           <Tooltip formatter={(v,name)=>[gbp(v),properties.find(p=>p.id===name)?.name||name]} contentStyle={{borderRadius:10,border:`1px solid ${C.border}`,fontSize:13}}/>
           <Legend formatter={name=>properties.find(p=>p.id===name)?.name||name}/>
           {properties.map(p=><Bar key={p.id} dataKey={p.id} fill={p.color} radius={[4,4,0,0]}/>)}
         </BarChart>
       </ResponsiveContainer>}
     </div>
   </>}
   {view==="property"&&<>
     <div style={{display:"flex",gap:10,marginBottom:24,flexWrap:"wrap"}}>
       {properties.map(p=><button key={p.id} onClick={()=>setSelP(p.id)} style={{padding:"8px 18px",borderRadius:20,border:`2px solid ${selP===p.id?p.color:C.border}`,background:selP===p.id?p.color+"18":"transparent",color:selP===p.id?p.color:C.muted,fontSize:13,fontWeight:700}}>{p.name}</button>)}
       {properties.length===0&&<p style={{color:C.muted}}>Add properties first</p>}
     </div>
     {selP&&<>
       <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px 24px 16px",marginBottom:24}}>
         <div style={{fontWeight:700,fontSize:15,marginBottom:20}}>{properties.find(p=>p.id===selP)?.name} — revenue & occupancy {yr}</div>
         <ResponsiveContainer width="100%" height={260}>
           <ComposedChart data={occData}>
             <CartesianGrid strokeDasharray="3 3" stroke={C.border} vertical={false}/>
             <XAxis dataKey="month" tick={{fontSize:12,fill:C.muted}} axisLine={false} tickLine={false}/>
             <YAxis yAxisId="rev" tickFormatter={v=>"£"+(v/1000).toFixed(0)+"k"} tick={{fontSize:12,fill:C.muted}} axisLine={false} tickLine={false}/>
             <YAxis yAxisId="occ" orientation="right" tickFormatter={v=>v+"%"} tick={{fontSize:12,fill:C.muted}} axisLine={false} tickLine={false} domain={[0,100]}/>
             <Tooltip contentStyle={{borderRadius:10,border:`1px solid ${C.border}`,fontSize:13}}/>
             <Bar yAxisId="rev" dataKey="revenue" fill={properties.find(p=>p.id===selP)?.color||C.navy} radius={[4,4,0,0]}/>
             <Line yAxisId="occ" type="monotone" dataKey="occupancy" stroke={C.amber} strokeWidth={2.5} dot={{r:4,fill:C.amber}}/>
           </ComposedChart>
         </ResponsiveContainer>
       </div>
     </>}
   </>}
   {showAdd&&<Modal onClose={()=>setShowAdd(false)} title="Add earnings">
     <div style={{display:"flex",flexDirection:"column",gap:14}}>
       <div><label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Property</label>
       <select value={form.propertyId} onChange={e=>setForm(f=>({...f,propertyId:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
         {properties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
       </select></div>
       <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
         <div><label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Year</label>
         <select value={form.year} onChange={e=>setForm(f=>({...f,year:Number(e.target.value)}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
           {[today.getFullYear()-1,today.getFullYear(),today.getFullYear()+1].map(y=><option key={y} value={y}>{y}</option>)}
         </select></div>
         <div><label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Month</label>
         <select value={form.month} onChange={e=>setForm(f=>({...f,month:Number(e.target.value)}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
           {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
         </select></div>
       </div>
       <Field label="Revenue (£)" value={form.revenue} onChange={v=>setForm(f=>({...f,revenue:v}))} placeholder="e.g. 1840"/>
       <Field label="Nights booked" value={form.nights} onChange={v=>setForm(f=>({...f,nights:v}))} placeholder="e.g. 18"/>
       <div style={{display:"flex",gap:10,marginTop:8}}><Btn onClick={addManual}>Save</Btn><Btn onClick={()=>setShowAdd(false)} secondary>Cancel</Btn></div>
     </div>
   </Modal>}
 </div>;
}

function PropertiesView({properties,setProperties,bookings,showToast}){
 const [showAdd,setShowAdd]=useState(false);
 const [form,setForm]=useState({name:"",address:"",icalUrl:"",color:C.coral});
 return <div>
   <PH title="Properties" subtitle={properties.length+" properties"}><Btn onClick={()=>setShowAdd(true)}>+ Add property</Btn></PH>
   {properties.length===0&&<Empty icon="🏠" text="No properties yet"/>}
   <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16}}>
     {properties.map(prop=>{
       const pb=bookings.filter(b=>b.propertyId===prop.id);
       return <div key={prop.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
         <div style={{height:6,background:prop.color}}/>
         <div style={{padding:"18px 20px"}}>
           <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>{prop.name}</div>
           <div style={{color:C.textSoft,fontSize:13,marginBottom:14}}>📍 {prop.address}</div>
           <div style={{display:"flex",gap:16}}>
             <div><div style={{fontSize:20,fontWeight:800}}>{pb.length}</div><div style={{fontSize:12,color:C.muted}}>Bookings</div></div>
             <div><div style={{fontSize:20,fontWeight:800}}>{pb.filter(b=>b.checkin>=today).length}</div><div style={{fontSize:12,color:C.muted}}>Upcoming</div></div>
           </div>
           <div style={{marginTop:14,fontSize:12,color:prop.icalUrl?C.mint:C.muted,background:prop.icalUrl?"#E8FAF4":C.bg,padding:"6px 10px",borderRadius:8}}>
             {prop.icalUrl?"✓ iCal connected":"⚠ No iCal URL"}
           </div>
         </div>
       </div>;
     })}
   </div>
   {showAdd&&<Modal onClose={()=>setShowAdd(false)} title="Add property">
     <div style={{display:"flex",flexDirection:"column",gap:14}}>
       <Field label="Property name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Harbour View Studio"/>
       <Field label="Address" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} placeholder="Full address"/>
       <Field label="Airbnb iCal URL" value={form.icalUrl} onChange={v=>setForm(f=>({...f,icalUrl:v}))} placeholder="https://www.airbnb.co.uk/calendar/ical/..."/>
       <div><label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Colour</label>
       <div style={{display:"flex",gap:8}}>
         {[C.coral,C.mint,"#7C5CBF",C.amber,"#3B82F6"].map(col=><div key={col} onClick={()=>setForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:form.color===col?`3px solid ${C.navy}`:"3px solid transparent"}}/>)}
       </div></div>
       <div style={{display:"flex",gap:10,marginTop:8}}>
         <Btn onClick={()=>{if(!form.name.trim())return;setProperties(ps=>[...ps,{...form,id:"p"+Date.now()}]);setForm({name:"",address:"",icalUrl:"",color:C.coral});setShowAdd(false);showToast("Property added");}}>Add property</Btn>
         <Btn onClick={()=>setShowAdd(false)} secondary>Cancel</Btn>
       </div>
     </div>
   </Modal>}
 </div>;
}

function TeamView({cleaners,setCleaners,properties,showToast}){
 const [showAdd,setShowAdd]=useState(false);
 const [form,setForm]=useState({name:"",phone:"",pin:"",assignedProperties:[]});
 return <div>
   <PH title="Team" subtitle={cleaners.length+" cleaners"}><Btn onClick={()=>setShowAdd(true)}>+ Add cleaner</Btn></PH>
   {cleaners.length===0&&<Empty icon="👥" text="No cleaners yet"/>}
   <div style={{display:"flex",flexDirection:"column",gap:12}}>
     {cleaners.map(c=><div key={c.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 22px"}}>
       <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
         <div style={{width:42,height:42,borderRadius:"50%",background:C.navy,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:16,flexShrink:0}}>{c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
         <div style={{flex:1}}>
           <div style={{fontWeight:700,fontSize:15}}>{c.name}</div>
           <div style={{color:C.textSoft,fontSize:13}}>{c.phone} · PIN: {c.pin}</div>
           <div style={{marginTop:12}}>
             <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:6}}>Assigned properties</div>
             <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
               {properties.map(prop=>{
                 const active=c.assignedProperties.includes(prop.id);
                 return <button key={prop.id} onClick={()=>setCleaners(cs=>cs.map(x=>{if(x.id!==c.id)return x;const has=x.assignedProperties.includes(prop.id);return{...x,assignedProperties:has?x.assignedProperties.filter(p=>p!==prop.id):[...x.assignedProperties,prop.id]};}))} style={{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${active?prop.color:C.border}`,background:active?prop.color+"18":"transparent",color:active?prop.color:C.muted,fontSize:12,fontWeight:600}}>{prop.name}</button>;
               })}
               {properties.length===0&&<span style={{fontSize:12,color:C.muted}}>Add properties first</span>}
             </div>
           </div>
         </div>
       </div>
     </div>)}
   </div>
   {showAdd&&<Modal onClose={()=>setShowAdd(false)} title="Add cleaner">
     <div style={{display:"flex",flexDirection:"column",gap:14}}>
       <Field label="Full name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Maria Santos"/>
       <Field label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="+447700900000"/>
       <Field label="4-digit PIN" value={form.pin} onChange={v=>{if(/^\d{0,4}$/.test(v))setForm(f=>({...f,pin:v}));}} placeholder="e.g. 5678"/>
       <div style={{display:"flex",gap:10,marginTop:8}}>
         <Btn onClick={()=>{if(!form.name.trim()||form.pin.length!==4)return;setCleaners(cs=>[...cs,{...form,id:"c"+Date.now()}]);setForm({name:"",phone:"",pin:"",assignedProperties:[]});setShowAdd(false);showToast("Cleaner added");}}>Add cleaner</Btn>
         <Btn onClick={()=>setShowAdd(false)} secondary>Cancel</Btn>
       </div>
     </div>
   </Modal>}
 </div>;
}

function SettingsView(){
 return <div>
   <PH title="Settings" subtitle="Integrations & notifications"/>
   <div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:560}}>
     {[
       {title:"Airbnb iCal sync",desc:"Add an iCal URL per property. Find it in Airbnb → Calendar → Export calendar.",badge:"Ready",color:C.mint},
       {title:"SMS (Twilio)",desc:"Wire up your Twilio Account SID and auth token to send real SMS to cleaners.",badge:"Console only",color:C.amber},
       {title:"Manager PIN",desc:"Current manager PIN is 0000. Change in the code before going live.",badge:"Default",color:C.muted},
     ].map(s=><div key={s.title} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 22px"}}>
       <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
         <div style={{fontWeight:700,fontSize:15}}>{s.title}</div>
         <span style={{...pill("pending"),background:s.color+"22",color:s.color}}>{s.badge}</span>
       </div>
       <div style={{color:C.textSoft,fontSize:13,lineHeight:1.6}}>{s.desc}</div>
     </div>)}
   </div>
 </div>;
}

function CleanerPortal({cleaner,properties,cleans,bookings,setCleans,showToast,toast,onLogout}){
 const mine=cleans.filter(c=>c.cleanerId===cleaner.id).sort((a,b)=>a.date-b.date);
 return <div style={{minHeight:"100vh",background:C.bg}}>
   {toast&&<Toast msg={toast.msg} type={toast.type}/>}
   <div style={{background:C.navy,padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
     <div><div style={{fontSize:11,color:C.coral,fontWeight:700,textTransform:"uppercase"}}>CleanOps</div><div style={{color:"#fff",fontWeight:700,fontSize:18}}>Hi, {cleaner.name.split(" ")[0]} 👋</div></div>
     <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"8px 16px",borderRadius:10,fontSize:13}}>Log out</button>
   </div>
   <div style={{padding:"28px 24px",maxWidth:600,margin:"0 auto"}}>
     <div style={{display:"flex",gap:16,marginBottom:28}}>
       <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 20px",textAlign:"center"}}>
         <div style={{fontSize:28,fontWeight:800,color:C.coral}}>{mine.filter(c=>c.status!=="complete").length}</div>
         <div style={{fontSize:13,color:C.textSoft}}>Pending</div>
       </div>
       <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 20px",textAlign:"center"}}>
         <div style={{fontSize:28,fontWeight:800,color:C.mint}}>{mine.filter(c=>c.status==="complete").length}</div>
         <div style={{fontSize:13,color:C.textSoft}}>Completed</div>
       </div>
     </div>
     <ST>Your cleans</ST>
     <div style={{display:"flex",flexDirection:"column",gap:12}}>
       {mine.length===0&&<Empty icon="☀️" text="No cleans assigned yet"/>}
       {mine.map(c=>{
         const prop=properties.find(p=>p.id===c.propertyId);
         const bk=bookings.find(b=>b.id===c.bookingId);
         return <div key={c.id} style={{background:C.surface,border:`1px solid ${c.status==="complete"?C.mint:C.border}`,borderRadius:14,padding:"18px 20px"}}>
           <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
             <div><div style={{fontWeight:700,fontSize:15}}>{prop?.name}</div><div style={{color:C.textSoft,fontSize:13}}>📅 {fmt(c.date)}{bk?" · after "+bk.guest:""}</div>{prop?.address&&<div style={{color:C.muted,fontSize:12,marginTop:2}}>📍 {prop.address}</div>}</div>
             <span style={pill(c.status)}>{c.status}</span>
           </div>
           {c.status!=="complete"&&<div style={{display:"flex",gap:8,marginTop:12}}>
             {c.status==="pending"&&<Btn onClick={()=>{setCleans(cs=>cs.map(x=>x.id===c.id?{...x,status:"in-progress"}:x));showToast("Started!");}} small secondary>🧹 Start clean</Btn>}
             {c.status==="in-progress"&&<Btn onClick={()=>{setCleans(cs=>cs.map(x=>x.id===c.id?{...x,status:"complete"}:x));showToast("Clean complete ✓");}} small>✓ Mark complete</Btn>}
           </div>}
           {c.status==="complete"&&<div style={{color:C.mint,fontSize:13,marginTop:6,fontWeight:600}}>✓ Done</div>}
         </div>;
       })}
     </div>
   </div>
 </div>;
}

function App(){
 const [role,setRole]=useState(null);
 const [cleaner,setCleaner]=useState(null);
 const [pin,setPin]=useState("");
 const [pinErr,setPinErr]=useState("");
 const [properties,setProperties]=useState([]);
 const [cleaners,setCleaners]=useState([]);
 const [bookings,setBookings]=useState([]);
 const [cleans,setCleans]=useState([]);
 const [earnings,setEarnings]=useState([]);
 const [tab,setTab]=useState("diary");
 const [toast,setToast]=useState(null);
 const showToast=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3200);},[]);

 if(!role)return <Login pin={pin} setPin={setPin} pinErr={pinErr} setPinErr={setPinErr} cleaners={cleaners} setRole={setRole} setCleaner={setCleaner}/>;
 if(role==="cleaner")return <CleanerPortal cleaner={cleaner} properties={properties} cleans={cleans} bookings={bookings} setCleans={setCleans} showToast={showToast} toast={toast} onLogout={()=>{setRole(null);setPin("");setCleaner(null);}}/>;

 return <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Inter',system-ui,sans-serif",color:C.text}}>
   {toast&&<Toast msg={toast.msg} type={toast.type}/>}
   <Sidebar tab={tab} setTab={setTab} onLogout={()=>{setRole(null);setPin("");}}/>
   <div style={{marginLeft:220,padding:"32px 36px",maxWidth:1100}}>
     {tab==="diary"&&<DiaryView properties={properties} bookings={bookings} cleans={cleans} cleaners={cleaners} setCleans={setCleans} setBookings={setBookings} showToast={showToast}/>}
     {tab==="cleans"&&<CleansView cleans={cleans} setCleans={setCleans} properties={properties} cleaners={cleaners} bookings={bookings} showToast={showToast}/>}
     {tab==="earnings"&&<EarningsView properties={properties} earnings={earnings} setEarnings={setEarnings} showToast={showToast}/>}
     {tab==="properties"&&<PropertiesView properties={properties} setProperties={setProperties} bookings={bookings} showToast={showToast}/>}
     {tab==="team"&&<TeamView cleaners={cleaners} setCleaners={setCleaners} properties={properties} showToast={showToast}/>}
     {tab==="settings"&&<SettingsView/>}
   </div>
 </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
