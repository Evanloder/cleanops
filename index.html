<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanOps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F7F8FA;color:#1B2A4A}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

const C={bg:"#F7F8FA",surface:"#FFFFFF",navy:"#1B2A4A",coral:"#E8614A",mint:"#2ECC9A",amber:"#F0A500",muted:"#8A94A6",border:"#E4E8F0",text:"#1B2A4A",textSoft:"#5A6478"};
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const today=new Date();
const fmt=dt=>new Date(dt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtS=dt=>new Date(dt).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const sameDay=(a,b)=>{const x=new Date(a),y=new Date(b);return x.getDate()===y.getDate()&&x.getMonth()===y.getMonth()&&x.getFullYear()===y.getFullYear();};
const isToday=dt=>sameDay(dt,today);
const gbp=v=>"£"+Number(v||0).toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0});
const dd=(n,h=11)=>{const d=new Date(today);d.setDate(d.getDate()+n);d.setHours(h,0,0,0);return d;};

const CHECKLIST_ITEMS=["Change all bedding","Replace towels","Clean bathroom","Clean kitchen","Vacuum all rooms","Mop hard floors","Wipe surfaces","Check appliances","Restock toiletries","Empty bins","Check for damage","Lock up securely"];

function pill(s){
 const m={pending:[C.amber,"#FFF8E7"],"in-progress":[C.navy,"#EEF1F7"],complete:[C.mint,"#E8FAF4"],open:[C.coral,"#FFF0EE"],resolved:[C.mint,"#E8FAF4"]};
 const [fg,bg]=m[s]||[C.muted,"#F4F5F7"];
 return {color:fg,background:bg,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700,textTransform:"uppercase",display:"inline-block"};
}

function load(key,def){
 try{
   const v=localStorage.getItem("co_"+key);
   if(v){
     const p=JSON.parse(v);
     if(key==="bookings") return p.map(b=>({...b,checkin:new Date(b.checkin),checkout:new Date(b.checkout)}));
     if(key==="cleans")   return p.map(c=>({...c,date:new Date(c.date)}));
     return p;
   }
 }catch(e){}
 return def;
}
function save(key,val){try{localStorage.setItem("co_"+key,JSON.stringify(val));}catch(e){}}

// ── UI COMPONENTS ──────────────────────────────────────────────────────────────
function Btn({onClick,children,secondary,small,danger}){
 const bg=danger?C.coral:secondary?C.surface:C.navy;
 const color=secondary&&!danger?C.text:"#fff";
 const border=secondary?`1.5px solid ${danger?C.coral:C.border}`:"none";
 return <button onClick={onClick} style={{padding:small?"6px 12px":"9px 18px",borderRadius:10,border,background:bg,color,fontSize:small?12:14,fontWeight:600,whiteSpace:"nowrap"}}>{children}</button>;
}

function Card({children,style={}}){
 return <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 20px",...style}}>{children}</div>;
}

function Modal({onClose,title,children,wide}){
 return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
   <div style={{background:C.surface,borderRadius:20,padding:"24px",width:"100%",maxWidth:wide?640:480,maxHeight:"90vh",overflowY:"auto"}}>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
       <div style={{fontWeight:800,fontSize:18}}>{title}</div>
       <button onClick={onClose} style={{background:C.bg,border:"none",borderRadius:8,width:32,height:32,fontSize:18,cursor:"pointer"}}>×</button>
     </div>
     {children}
   </div>
 </div>;
}

function Field({label,value,onChange,placeholder,type="text",multiline}){
 return <div style={{marginBottom:12}}>
   <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>{label}</label>
   {multiline
     ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3}
         style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg,outline:"none",resize:"vertical"}}/>
     : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
         style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg,outline:"none"}}/>
   }
 </div>;
}

function Toast({msg,type}){
 return <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:type==="error"?C.coral:C.mint,color:"#fff",padding:"12px 24px",borderRadius:12,fontWeight:600,fontSize:14,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{msg}</div>;
}

function SectionTitle({children}){
 return <div style={{fontSize:13,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:12}}>{children}</div>;
}

function PH({title,subtitle,children}){
 return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
   <div>
     <h1 style={{fontSize:24,fontWeight:800}}>{title}</h1>
     {subtitle&&<div style={{fontSize:13,color:C.muted,marginTop:2}}>{subtitle}</div>}
   </div>
   {children&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{children}</div>}
 </div>;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function Login({cleaners,setRole,setCleaner}){
 const [pin,setPin]=useState("");
 const [err,setErr]=useState("");
 const handle=dg=>{
   if(dg==="←"){setPin(p=>p.slice(0,-1));setErr("");return;}
   const next=pin+dg; setPin(next); setErr("");
   if(next.length===4){
     if(next==="0000"){setRole("manager");return;}
     const c=cleaners.find(x=>x.pin===next);
     if(c){setRole("cleaner");setCleaner(c);return;}
     setTimeout(()=>{setPin("");setErr("Wrong PIN — try again");},300);
   }
 };
 const digits=["1","2","3","4","5","6","7","8","9","","0","←"];
 return <div style={{minHeight:"100vh",background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
   <div style={{marginBottom:32,textAlign:"center"}}>
     <div style={{fontSize:11,letterSpacing:"0.2em",color:C.coral,fontWeight:700,textTransform:"uppercase",marginBottom:8}}>CleanOps</div>
     <div style={{fontSize:26,fontWeight:700,color:"#fff"}}>Enter your PIN</div>
     <div style={{color:"#8A99B8",marginTop:6,fontSize:13}}>Manager: 0000 · Cleaners use their own PIN</div>
   </div>
   <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:280,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
     <div style={{display:"flex",justifyContent:"center",gap:12,marginBottom:24}}>
       {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?C.navy:C.border}}/>)}
     </div>
     {err&&<div style={{color:C.coral,fontSize:13,textAlign:"center",marginBottom:12}}>{err}</div>}
     <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
       {digits.map((d,i)=><button key={i} onClick={()=>d&&handle(d)} style={{height:54,borderRadius:12,border:"none",background:d?"#F7F8FA":"transparent",fontSize:20,fontWeight:600,color:C.navy,cursor:d?"pointer":"default"}}>{d}</button>)}
     </div>
   </div>
 </div>;
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────────
function Sidebar({tab,setTab,onLogout,maintenanceCount,unreadCount}){
 const items=[
   {id:"diary",label:"Diary",icon:"📅"},
   {id:"cleans",label:"Cleans",icon:"🧹"},
   {id:"occupancy",label:"Occupancy",icon:"📊"},
   {id:"earnings",label:"Earnings",icon:"💷"},
   {id:"expenses",label:"Expenses",icon:"🧾"},
   {id:"properties",label:"Properties",icon:"🏠"},
   {id:"team",label:"Team",icon:"👥"},
   {id:"maintenance",label:"Maintenance",icon:"🔧",badge:maintenanceCount},
   {id:"messages",label:"Messages",icon:"💬",badge:unreadCount},
 ];
 return <div style={{position:"fixed",left:0,top:0,bottom:0,width:200,background:C.navy,display:"flex",flexDirection:"column",padding:"20px 0",zIndex:50,overflowY:"auto"}}>
   <div style={{padding:"0 16px 20px",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
     <div style={{fontSize:10,letterSpacing:"0.2em",color:C.coral,fontWeight:700,textTransform:"uppercase"}}>CleanOps</div>
     <div style={{color:"#fff",fontWeight:700,fontSize:14,marginTop:2}}>Manager</div>
   </div>
   <nav style={{flex:1,padding:"12px 8px"}}>
     {items.map(item=><button key={item.id} onClick={()=>setTab(item.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"10px 12px",borderRadius:10,border:"none",marginBottom:2,background:tab===item.id?"rgba(255,255,255,0.12)":"transparent",color:tab===item.id?"#fff":"#8A99B8",fontSize:14,fontWeight:tab===item.id?600:400,textAlign:"left",cursor:"pointer"}}>
       <span>{item.icon} {item.label}</span>
       {item.badge>0&&<span style={{background:C.coral,color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 6px"}}>{item.badge}</span>}
     </button>)}
   </nav>
   <div style={{padding:"0 8px"}}>
     <button onClick={onLogout} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"none",background:"transparent",color:"#8A99B8",fontSize:13,textAlign:"left",cursor:"pointer"}}>🚪 Log out</button>
   </div>
 </div>;
}

// ── DIARY ──────────────────────────────────────────────────────────────────────
function DiaryView({properties,bookings,setBookings,cleans,setCleans,cleaners,showToast}){
 const [wo,setWo]=useState(0);
 const [showAdd,setShowAdd]=useState(false);
 const [editB,setEditB]=useState(null);
 const [selB,setSelB]=useState(null);
 const [bForm,setBForm]=useState({propertyId:"",guest:"",checkin:"",checkout:"",notes:"",rating:""});

 const ws=new Date(today); ws.setDate(today.getDate()-today.getDay()+1+wo*7);
 const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
 const upcoming=bookings.filter(b=>new Date(b.checkout)>today&&new Date(b.checkout)<=dd(7)).sort((a,b)=>new Date(a.checkout)-new Date(b.checkout));
 const todayOuts=bookings.filter(b=>sameDay(b.checkout,today));

 function notify(b){
   const p=properties.find(x=>x.id===b.propertyId);
   const assigned=cleaners.filter(c=>c.assignedProperties?.includes(b.propertyId));
   const msg=encodeURIComponent("Hi, just a reminder that there is a checkout at "+(p?.name||"the property")+" on "+fmt(b.checkout)+". Please can you go in and clean as soon as possible. Thanks");
   if(assigned.length>0){const phone=assigned[0].phone.replace(/\s/g,"");window.open("sms:"+phone+"?body="+msg,"_self");}
   else window.open("sms:?body="+msg,"_self");
   setBookings(bs=>bs.map(x=>x.id===b.id?{...x,notified:true}:x));
   showToast("Opening Messages...");
 }

 function schedClean(b){
   if(cleans.find(c=>c.bookingId===b.id)){showToast("Clean already scheduled");return;}
   const p=properties.find(x=>x.id===b.propertyId);
   const ac=cleaners.find(c=>c.assignedProperties?.includes(b.propertyId));
   setCleans(cs=>[...cs,{id:"cl"+Date.now(),bookingId:b.id,propertyId:b.propertyId,cleanerId:ac?.id||null,date:new Date(b.checkout),status:"pending",checklist:{},photos:[],notes:""}]);
   showToast("Clean scheduled for "+p?.name);
 }

 function saveBooking(){
   if(!bForm.propertyId||!bForm.guest||!bForm.checkin||!bForm.checkout)return;
   const cin=new Date(bForm.checkin); cin.setHours(15,0,0,0);
   const cout=new Date(bForm.checkout); cout.setHours(11,0,0,0);
   if(editB){
     setBookings(bs=>bs.map(x=>x.id===editB.id?{...x,propertyId:bForm.propertyId,guest:bForm.guest,checkin:cin,checkout:cout,notes:bForm.notes,rating:bForm.rating}:x));
     showToast("Booking updated");setEditB(null);
   } else {
     setBookings(bs=>[...bs,{id:"b"+Date.now(),propertyId:bForm.propertyId,guest:bForm.guest,checkin:cin,checkout:cout,notes:bForm.notes,rating:bForm.rating,notified:false}]);
     showToast("Booking added");
   }
   setBForm({propertyId:"",guest:"",checkin:"",checkout:"",notes:"",rating:""});
   setShowAdd(false);
 }

 function openEdit(b){
   setBForm({propertyId:b.propertyId,guest:b.guest,checkin:new Date(b.checkin).toISOString().split("T")[0],checkout:new Date(b.checkout).toISOString().split("T")[0],notes:b.notes||"",rating:b.rating||""});
   setEditB(b);setShowAdd(true);
 }

 return <div>
   <PH title="Booking Diary" subtitle={fmtS(days[0])+" – "+fmtS(days[6])}>
     <Btn onClick={()=>setWo(w=>w-1)} secondary small>← Prev</Btn>
     <Btn onClick={()=>setWo(0)} secondary small>Today</Btn>
     <Btn onClick={()=>setWo(w=>w+1)} secondary small>Next →</Btn>
     <Btn onClick={()=>{setEditB(null);setBForm({propertyId:"",guest:"",checkin:"",checkout:"",notes:"",rating:""});setShowAdd(true);}}>+ Booking</Btn>
   </PH>

   {todayOuts.length>0&&<div style={{background:"#FFF3F1",border:`1px solid ${C.coral}`,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",gap:10}}>
     <span>🔔</span>
     <div><div style={{fontWeight:700,color:C.coral,fontSize:13}}>Checkouts today</div>
     <div style={{color:C.textSoft,fontSize:13}}>{todayOuts.map(b=>b.guest).join(", ")}</div></div>
   </div>}

   <div style={{background:C.surface,borderRadius:14,border:`1px solid ${C.border}`,overflow:"auto",marginBottom:24}}>
     <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
       <thead>
         <tr style={{background:"#FAFBFD"}}>
           <th style={{padding:"10px 14px",textAlign:"left",fontSize:12,color:C.muted,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>Property</th>
           {days.map((day,i)=><th key={i} style={{padding:"8px",textAlign:"center",borderBottom:`1px solid ${C.border}`,borderLeft:`1px solid ${C.border}`,background:isToday(day)?"#EEF6FF":"#FAFBFD",minWidth:50}}>
             <div style={{fontSize:10,color:C.muted,textTransform:"uppercase"}}>{day.toLocaleDateString("en-GB",{weekday:"short"})}</div>
             <div style={{fontWeight:isToday(day)?800:500,fontSize:14,color:isToday(day)?C.coral:C.text}}>{day.getDate()}</div>
           </th>)}
         </tr>
       </thead>
       <tbody>
         {properties.length===0&&<tr><td colSpan={8} style={{padding:32,textAlign:"center",color:C.muted}}>Add properties to see the diary</td></tr>}
         {properties.map(prop=><tr key={prop.id} style={{borderBottom:`1px solid ${C.border}`}}>
           <td style={{padding:"10px 14px"}}>
             <div style={{display:"flex",alignItems:"center",gap:6}}>
               <div style={{width:8,height:8,borderRadius:"50%",background:prop.color}}/>
               <span style={{fontSize:12,fontWeight:600}}>{prop.name}</span>
             </div>
           </td>
           {days.map((day,i)=>{
             const bks=bookings.filter(b=>b.propertyId===prop.id&&new Date(b.checkin)<=day&&new Date(b.checkout)>day);
             const isOut=bookings.some(b=>b.propertyId===prop.id&&sameDay(b.checkout,day));
             return <td key={i} onClick={()=>bks[0]&&setSelB(bks[0])} style={{borderLeft:`1px solid ${C.border}`,background:isToday(day)?"#FAFEFF":"transparent",padding:3,verticalAlign:"top",cursor:bks[0]?"pointer":"default"}}>
               {bks.map(b=><div key={b.id} style={{background:prop.color+"22",borderLeft:`3px solid ${prop.color}`,borderRadius:3,padding:"2px 4px",fontSize:10,fontWeight:600,color:prop.color}}>{b.guest.split(" ")[0]}</div>)}
               {isOut&&<div style={{fontSize:8,color:C.coral,fontWeight:700,textAlign:"right"}}>OUT</div>}
             </td>;
           })}
         </tr>)}
       </tbody>
     </table>
   </div>

   <SectionTitle>Upcoming checkouts — next 7 days</SectionTitle>
   {upcoming.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:C.muted}}>🏖️ No checkouts in the next 7 days</div>}
   <div style={{display:"flex",flexDirection:"column",gap:10}}>
     {upcoming.map(b=>{
       const prop=properties.find(p=>p.id===b.propertyId);
       const hasClean=cleans.some(c=>c.bookingId===b.id);
       return <Card key={b.id}>
         <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
           <div style={{width:8,height:8,borderRadius:"50%",background:prop?.color,marginTop:5,flexShrink:0}}/>
           <div style={{flex:1}}>
             <div style={{fontWeight:600}}>{b.guest} {b.rating&&<span style={{fontSize:12,color:C.amber}}>{"★".repeat(Number(b.rating))}</span>}</div>
             <div style={{fontSize:13,color:C.textSoft}}>{prop?.name} · Checkout {fmt(b.checkout)}</div>
             {b.notes&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>📝 {b.notes}</div>}
           </div>
           <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
             {!hasClean&&<Btn onClick={()=>schedClean(b)} secondary small>+ Clean</Btn>}
             {hasClean&&<span style={pill("pending")}>Scheduled</span>}
             {!b.notified&&<Btn onClick={()=>notify(b)} small>Notify</Btn>}
             {b.notified&&<span style={{...pill("complete"),fontSize:11}}>✓ Notified</span>}
             <button onClick={()=>openEdit(b)} style={{background:"none",border:"none",fontSize:16,cursor:"pointer"}}>✏️</button>
             <button onClick={()=>{if(window.confirm("Delete this booking?"))setBookings(bs=>bs.filter(x=>x.id!==b.id));}} style={{background:"none",border:"none",fontSize:16,cursor:"pointer"}}>🗑️</button>
           </div>
         </div>
       </Card>;
     })}
   </div>

   {selB&&<Modal onClose={()=>setSelB(null)} title="Booking details">
     <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
       {[["Guest",selB.guest],["Property",properties.find(p=>p.id===selB.propertyId)?.name],["Check-in",fmt(selB.checkin),C.mint],["Checkout",fmt(selB.checkout),C.coral]].map(([l,v,a])=><div key={l} style={{background:C.bg,borderRadius:10,padding:"10px 14px"}}>
         <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:2}}>{l}</div>
         <div style={{fontSize:14,fontWeight:700,color:a||C.text}}>{v}</div>
       </div>)}
     </div>
     {selB.notes&&<div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:12}}><div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:2}}>Notes</div><div style={{fontSize:13}}>{selB.notes}</div></div>}
     {selB.rating&&<div style={{fontSize:14,color:C.amber,marginBottom:12}}>{"★".repeat(Number(selB.rating))} Guest rating</div>}
     <div style={{display:"flex",gap:8}}>
       <Btn onClick={()=>{openEdit(selB);setSelB(null);}}>Edit booking</Btn>
       <Btn onClick={()=>{if(window.confirm("Delete?"))setBookings(bs=>bs.filter(x=>x.id!==selB.id));setSelB(null);}} danger>Delete</Btn>
     </div>
   </Modal>}

   {showAdd&&<Modal onClose={()=>{setShowAdd(false);setEditB(null);}} title={editB?"Edit booking":"Add booking"}>
     <div>
       <div style={{marginBottom:12}}>
         <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>Property</label>
         <select value={bForm.propertyId} onChange={e=>setBForm(f=>({...f,propertyId:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
           <option value="">Select property...</option>
           {properties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
         </select>
       </div>
       <Field label="Guest name" value={bForm.guest} onChange={v=>setBForm(f=>({...f,guest:v}))} placeholder="e.g. John Smith"/>
       <Field label="Check-in" value={bForm.checkin} onChange={v=>setBForm(f=>({...f,checkin:v}))} type="date"/>
       <Field label="Checkout" value={bForm.checkout} onChange={v=>setBForm(f=>({...f,checkout:v}))} type="date"/>
       <Field label="Notes (parking, pets, early checkin...)" value={bForm.notes} onChange={v=>setBForm(f=>({...f,notes:v}))} placeholder="Any special notes..." multiline/>
       <div style={{marginBottom:12}}>
         <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>Guest rating (after checkout)</label>
         <div style={{display:"flex",gap:8}}>
           {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setBForm(f=>({...f,rating:String(n)}))} style={{fontSize:24,background:"none",border:"none",cursor:"pointer",opacity:Number(bForm.rating)>=n?1:0.3}}>★</button>)}
           {bForm.rating&&<button onClick={()=>setBForm(f=>({...f,rating:""}))} style={{fontSize:12,color:C.muted,background:"none",border:"none",cursor:"pointer"}}>Clear</button>}
         </div>
       </div>
       <div style={{display:"flex",gap:10,marginTop:16}}>
         <Btn onClick={saveBooking}>{editB?"Update":"Add booking"}</Btn>
         <Btn onClick={()=>{setShowAdd(false);setEditB(null);}} secondary>Cancel</Btn>
       </div>
     </div>
   </Modal>}
 </div>;
}

// ── CLEANS ─────────────────────────────────────────────────────────────────────
function CleansView({cleans,setCleans,properties,cleaners,bookings,showToast}){
 const [filter,setFilter]=useState("all");
 const [selC,setSelC]=useState(null);

           <div style={{width:16,height:16,borderRadius:4,background:selC.checklist?.[item]?C.mint:C.border,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
             {selC.checklist?.[item]&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
           </div>

       {selC.notes&&<><SectionTitle>Notes</SectionTitle><div style={{background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:16,fontSize:13}}>{selC.notes}</div></>}

}

// ── OCCUPANCY ──────────────────────────────────────────────────────────────────
function OccupancyView({properties,bookings}){
 const [yr,setYr]=useState(today.getFullYear());
 const [mo,setMo]=useState(today.getMonth());
 const daysInMonth=new Date(yr,mo+1,0).getDate();
 const days=Array.from({length:daysInMonth},(_,i)=>new Date(yr,mo,i+1));

 return <div>
   <PH title="Occupancy" subtitle={MONTHS[mo]+" "+yr}>
     <div style={{display:"flex",gap:8,alignItems:"center"}}>
       <button onClick={()=>{let m=mo-1,y=yr;if(m<0){m=11;y--;}setMo(m);setYr(y);}} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>←</button>
       <span style={{fontSize:14,fontWeight:600,minWidth:80,textAlign:"center"}}>{MONTHS[mo]} {yr}</span>
       <button onClick={()=>{let m=mo+1,y=yr;if(m>11){m=0;y++;}setMo(m);setYr(y);}} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>→</button>
     </div>
   </PH>
   <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"auto"}}>
     <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
       <thead>
         <tr style={{background:"#FAFBFD"}}>
           <th style={{padding:"10px 14px",textAlign:"left",fontSize:12,color:C.muted,fontWeight:600,borderBottom:`1px solid ${C.border}`,minWidth:140}}>Property</th>
           {days.map((day,i)=><th key={i} style={{padding:"6px 2px",textAlign:"center",borderBottom:`1px solid ${C.border}`,borderLeft:`1px solid ${C.border}`,fontSize:10,fontWeight:600,color:isToday(day)?C.coral:C.muted,minWidth:28,background:isToday(day)?"#EEF6FF":"#FAFBFD"}}>
             {day.getDate()}
           </th>)}
           <th style={{padding:"10px 8px",fontSize:12,fontWeight:700,color:C.text,textAlign:"right",borderBottom:`1px solid ${C.border}`,borderLeft:`1px solid ${C.border}`}}>Occ%</th>
         </tr>
       </thead>
       <tbody>
         {properties.length===0&&<tr><td colSpan={daysInMonth+2} style={{padding:32,textAlign:"center",color:C.muted}}>Add properties first</td></tr>}
         {properties.map(prop=>{
           const bookedDays=days.filter(day=>bookings.some(b=>b.propertyId===prop.id&&new Date(b.checkin)<=day&&new Date(b.checkout)>day)).length;
           const occ=Math.round((bookedDays/daysInMonth)*100);
           return <tr key={prop.id} style={{borderBottom:`1px solid ${C.border}`}}>
             <td style={{padding:"10px 14px"}}>
               <div style={{display:"flex",alignItems:"center",gap:6}}>
                 <div style={{width:8,height:8,borderRadius:"50%",background:prop.color}}/>
                 <span style={{fontSize:12,fontWeight:600}}>{prop.name}</span>
               </div>
             </td>
             {days.map((day,i)=>{
               const booked=bookings.some(b=>b.propertyId===prop.id&&new Date(b.checkin)<=day&&new Date(b.checkout)>day);
               const isIn=bookings.some(b=>b.propertyId===prop.id&&sameDay(b.checkin,day));
               const isOut=bookings.some(b=>b.propertyId===prop.id&&sameDay(b.checkout,day));
               let bg="transparent";
               if(booked) bg=prop.color+"33";
               if(isIn) bg=prop.color+"66";
               if(isOut) bg=prop.color+"22";
               return <td key={i} style={{borderLeft:`1px solid ${C.border}`,background:bg,height:36,padding:2,textAlign:"center"}}>
                 {isIn&&<div style={{fontSize:8,color:prop.color,fontWeight:700}}>IN</div>}
                 {isOut&&<div style={{fontSize:8,color:C.coral,fontWeight:700}}>OUT</div>}
               </td>;
             })}
             <td style={{padding:"10px 8px",textAlign:"right",borderLeft:`1px solid ${C.border}`,fontWeight:700,fontSize:13,color:occ>=70?C.mint:occ>=50?C.amber:C.coral}}>{occ}%</td>
           </tr>;
         })}
       </tbody>
     </table>
   </div>
   <div style={{display:"flex",gap:16,marginTop:16,fontSize:12,color:C.muted}}>
     <span>■ Occupied</span><span style={{color:C.mint}}>IN = check-in day</span><span style={{color:C.coral}}>OUT = checkout day</span>
   </div>
 </div>;
}

// ── EARNINGS ───────────────────────────────────────────────────────────────────
function EarningsView({properties,earnings,setEarnings,showToast}){
 const [yr,setYr]=useState(today.getFullYear());
 const [showAdd,setShowAdd]=useState(false);
 const [form,setForm]=useState({propertyId:properties[0]?.id||"",year:today.getFullYear(),month:today.getMonth(),revenue:"",nights:""});
 const getE=(pid,y,m)=>earnings.find(e=>e.propertyId===pid&&e.year===y&&e.month===m);
 const ytd=earnings.filter(e=>e.year===yr).reduce((s,e)=>s+e.revenue,0);
 const allYears=[...new Set([today.getFullYear(),...earnings.map(e=>e.year)])].sort();
 function save(){
   const rev=parseFloat(form.revenue),nts=parseInt(form.nights);
   if(!rev||!nts){showToast("Enter valid revenue and nights","error");return;}
   const ex=getE(form.propertyId,Number(form.year),Number(form.month));
   if(ex) setEarnings(es=>es.map(e=>e.id===ex.id?{...e,revenue:rev,nights:nts}:e));
   else setEarnings(es=>[...es,{id:"e"+Date.now(),propertyId:form.propertyId,year:Number(form.year),month:Number(form.month),revenue:rev,nights:nts}]);
   showToast("Saved");setShowAdd(false);
 }
 return <div>
   <PH title="Earnings" subtitle={yr}>
     <select value={yr} onChange={e=>setYr(Number(e.target.value))} style={{padding:"8px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.surface}}>
       {allYears.map(y=><option key={y} value={y}>{y}</option>)}
     </select>
     <Btn onClick={()=>setShowAdd(true)}>+ Add</Btn>
   </PH>
   <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12,marginBottom:24}}>
     <Card><div style={{fontSize:12,color:C.muted,marginBottom:4}}>YTD Revenue</div><div style={{fontSize:22,fontWeight:800,color:C.mint}}>{gbp(ytd)}</div></Card>
     <Card><div style={{fontSize:12,color:C.muted,marginBottom:4}}>Avg/property</div><div style={{fontSize:22,fontWeight:800}}>{gbp(properties.length?Math.round(ytd/properties.length):0)}</div></Card>
   </div>
   <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"auto"}}>
     <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
       <thead>
         <tr style={{background:"#FAFBFD",borderBottom:`1px solid ${C.border}`}}>
           <th style={{padding:"10px 14px",textAlign:"left",fontSize:12,fontWeight:700,color:C.muted}}>Property</th>
           {MONTHS.map(m=><th key={m} style={{padding:"8px 4px",fontSize:11,fontWeight:700,color:C.muted,textAlign:"center"}}>{m}</th>)}
           <th style={{padding:"10px 8px",fontSize:12,fontWeight:700,color:C.text,textAlign:"right"}}>Total</th>
         </tr>
       </thead>
       <tbody>
         {properties.length===0&&<tr><td colSpan={14} style={{padding:32,textAlign:"center",color:C.muted}}>Add properties first</td></tr>}
         {properties.map(prop=>{
           const total=earnings.filter(e=>e.propertyId===prop.id&&e.year===yr).reduce((s,e)=>s+e.revenue,0);
           return <tr key={prop.id} style={{borderBottom:`1px solid ${C.border}`}}>
             <td style={{padding:"10px 14px"}}>
               <div style={{display:"flex",alignItems:"center",gap:6}}>
                 <div style={{width:8,height:8,borderRadius:"50%",background:prop.color}}/>
                 <span style={{fontSize:13,fontWeight:600}}>{prop.name}</span>
               </div>
             </td>
             {MONTHS.map((_,mi)=>{
               const e=getE(prop.id,yr,mi);
               const dim=new Date(yr,mi+1,0).getDate();
               const occ=e?Math.round((e.nights/dim)*100):null;
               return <td key={mi} style={{padding:"8px 4px",textAlign:"center"}}>
                 {e?<div><div style={{fontSize:11,fontWeight:700}}>{gbp(e.revenue)}</div><div style={{fontSize:10,color:occ>=70?C.mint:occ>=50?C.amber:C.muted,fontWeight:600}}>{occ}%</div></div>:<span style={{color:C.border,fontSize:12}}>—</span>}
               </td>;
             })}
             <td style={{padding:"10px 8px",textAlign:"right",fontWeight:800,fontSize:13}}>{gbp(total)}</td>
           </tr>;
         })}
       </tbody>
     </table>
   </div>
   {showAdd&&<Modal onClose={()=>setShowAdd(false)} title="Add earnings">
     <div>
       <div style={{marginBottom:12}}>
         <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>Property</label>
         <select value={form.propertyId} onChange={e=>setForm(f=>({...f,propertyId:e.target.value}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
           {properties.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
         </select>
       </div>
       <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
         <div>
           <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>Year</label>
           <select value={form.year} onChange={e=>setForm(f=>({...f,year:Number(e.target.value)}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
             {[today.getFullYear()-1,today.getFullYear(),today.getFullYear()+1].map(y=><option key={y} value={y}>{y}</option>)}
           </select>
         </div>
         <div>
           <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:4}}>Month</label>
           <select value={form.month} onChange={e=>setForm(f=>({...f,month:Number(e.target.value)}))} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,background:C.bg}}>
             {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
           </select>
         </div>
       </div>
       <Field label="Revenue (£)" value={form.revenue} onChange={v=>setForm(f=>({...f,revenue:v}))} placeholder="e.g. 1840"/>
       <Field label="Nights booked" value={form.nights} onChange={v=>setForm(f=>({...f,nights:v}))} placeholder="e.g. 18"/>
       <div style={{display:"flex",gap:10,marginTop:16}}><Btn onClick={save}>Save</Btn><Btn onClick={()=>setShowAdd(false)} secondary>Cancel</Btn></div>
     </div>
   </Modal>}
 </div>;
}

// ── EXPENSES ───────────────────────────────────────────────────────────────────
function ExpensesView({properties,expenses,setExpenses,showToast}){

   if(!form.propertyId||!form.description||!form.amount)return;
   setExpenses(es=>[...es,{...form,id:"x"+Date.now(),amount:parseFloat(form.amount)}]);
   setForm({propertyId:"",description:"",amount:"",date:new Date().toISOString().split("T")[0],category:"maintenance"});

           <div style={{fontWeight:800,fontSize:15,color:C.coral}}>{gbp(e.amount)}</div>
           <button onClick={()=>setExpenses(es=>es.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.muted}}>🗑️</button>

// ── PROPERTIES ─────────────────────────────────────────────────────────────────
function PropertiesView({properties,setProperties,showToast}){
 const [showAdd,setShowAdd]=useState(false);
 const [editP,setEditP]=useState(null);
 const [form,setForm]=useState({name:"",address:"",icalUrl:"",color:C.coral,instructions:""});
 const colors=[C.coral,C.mint,"#7C5CBF",C.amber,"#3B82F6"];

 function save(){
   if(!form.name.trim())return;
   if(editP){
     setProperties(ps=>ps.map(p=>p.id===editP.id?{...p,...form}:p));
     showToast("Property updated");setEditP(null);
   } else {
     setProperties(ps=>[...ps,{...form,id:"p"+Date.now()}]);
     showToast("Property added");
   }
   setForm({name:"",address:"",icalUrl:"",color:C.coral,instructions:""});
   setShowAdd(false);
 }

 function openEdit(p){
   setForm({name:p.name,address:p.address||"",icalUrl:p.icalUrl||"",color:p.color,instructions:p.instructions||""});
   setEditP(p);setShowAdd(true);
 }

 return <div>
   <PH title="Properties" subtitle={properties.length+" properties"}><Btn onClick={()=>{setEditP(null);setForm({name:"",address:"",icalUrl:"",color:C.coral,instructions:""});setShowAdd(true);}}>+ Add</Btn></PH>
   {properties.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:C.muted}}>🏠 No properties yet</div>}
   <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
     {properties.map(p=><div key={p.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
       <div style={{height:5,background:p.color}}/>
       <div style={{padding:"16px 18px"}}>
         <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>

             <button onClick={()=>openEdit(p)} style={{background:"none",border:"none",fontSize:15,cursor:"pointer"}}>✏️</button>
             <button onClick={()=>{if(window.confirm("Delete "+p.name+"?"))setProperties(ps=>ps.filter(x=>x.id!==p.id));}} style={{background:"none",border:"none",fontSize:15,cursor:"pointer"}}>🗑️</button>
           </div>
         </div>
         <div style={{color:C.textSoft,fontSize:13,marginBottom:p.instructions?8:12}}>📍 {p.address||"No address"}</div>
         {p.instructions&&<div style={{fontSize:12,color:C.muted,background:C.bg,padding:"6px 10px",borderRadius:8,marginBottom:12}}>📋 {p.instructions.slice(0,80)}{p.instructions.length>80?"...":""}</div>}
         <div style={{fontSize:12,color:p.icalUrl?C.mint:C.muted,background:p.icalUrl?"#E8FAF4":C.bg,padding:"5px 10px",borderRadius:8}}>
           {p.icalUrl?"✓ iCal connected":"⚠ No iCal URL"}
         </div>
       </div>
     </div>)}
   </div>
   {showAdd&&<Modal onClose={()=>{setShowAdd(false);setEditP(null);}} title={editP?"Edit property":"Add property"}>
     <div>
       <Field label="Property name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="e.g. Top floor Hazlebank flat"/>
       <Field label="Address" value={form.address} onChange={v=>setForm(f=>({...f,address:v}))} placeholder="Full address"/>
       <Field label="Airbnb iCal URL" value={form.icalUrl} onChange={v=>setForm(f=>({...f,icalUrl:v}))} placeholder="https://www.airbnb.co.uk/calendar/ical/..."/>
       <Field label="Cleaning instructions (cleaners will see this)" value={form.instructions} onChange={v=>setForm(f=>({...f,instructions:v}))} placeholder="e.g. Spare key under mat. Use green cleaning products only..." multiline/>
       <div style={{marginBottom:16}}>
         <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Colour</label>
         <div style={{display:"flex",gap:8}}>
           {colors.map(col=><div key={col} onClick={()=>setForm(f=>({...f,color:col}))} style={{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",border:form.color===col?"3px solid "+C.navy:"3px solid transparent"}}/>)}
         </div>

// ── TEAM ───────────────────────────────────────────────────────────────────────
function TeamView({cleaners,setCleaners,properties,showToast}){
 const [showAdd,setShowAdd]=useState(false);
 const [form,setForm]=useState({name:"",phone:"",pin:"",assignedProperties:[]});
 function add(){
   if(!form.name.trim()||form.pin.length!==4)return;
   setCleaners(cs=>[...cs,{...form,id:"c"+Date.now()}]);
   setForm({name:"",phone:"",pin:"",assignedProperties:[]});
   setShowAdd(false);showToast("Cleaner added");
 }
 function toggleP(cid,pid){
   setCleaners(cs=>cs.map(c=>{
     if(c.id!==cid)return c;
     const has=(c.assignedProperties||[]).includes(pid);
     return{...c,assignedProperties:has?(c.assignedProperties||[]).filter(p=>p!==pid):[...(c.assignedProperties||[]),pid]};
   }));
 }
 return <div>
   <PH title="Team" subtitle={cleaners.length+" cleaners"}><Btn onClick={()=>setShowAdd(true)}>+ Add</Btn></PH>
   {cleaners.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:C.muted}}>👥 No cleaners yet</div>}
   <div style={{display:"flex",flexDirection:"column",gap:12}}>
     {cleaners.map(c=><Card key={c.id}>
       <div style={{display:"flex",gap:14}}>
         <div style={{width:40,height:40,borderRadius:"50%",background:C.navy,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15,flexShrink:0}}>
           {c.name.split(" ").map(n=>n[0]).join("").slice(0,2)}
         </div>
         <div style={{flex:1}}>
           <div style={{fontWeight:700,fontSize:15}}>{c.name}</div>
           <div style={{color:C.textSoft,fontSize:13}}>{c.phone} · PIN: {c.pin}</div>
           <div style={{marginTop:10,display:"flex",gap:6,flexWrap:"wrap"}}>
             {properties.map(prop=>{
               const active=(c.assignedProperties||[]).includes(prop.id);
               return <button key={prop.id} onClick={()=>toggleP(c.id,prop.id)} style={{padding:"3px 10px",borderRadius:20,border:`1.5px solid ${active?prop.color:C.border}`,background:active?prop.color+"18":"transparent",color:active?prop.color:C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{prop.name}</button>;
             })}
             {properties.length===0&&<span style={{fontSize:12,color:C.muted}}>Add properties first</span>}
           </div>
         </div>
         <button onClick={()=>setCleaners(cs=>cs.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.muted,alignSelf:"flex-start"}}>🗑️</button>
       </div>
     </Card>)}
   </div>
   {showAdd&&<Modal onClose={()=>setShowAdd(false)} title="Add cleaner">
     <div>
       <Field label="Full name" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Maria Santos"/>
       <Field label="Phone" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="+447700900000"/>
       <Field label="4-digit PIN" value={form.pin} onChange={v=>{if(/^\d{0,4}$/.test(v))setForm(f=>({...f,pin:v}));}} placeholder="e.g. 5678"/>
       <div style={{marginBottom:12}}>
         <label style={{fontSize:12,fontWeight:600,color:C.textSoft,display:"block",marginBottom:6}}>Assign properties</label>
         <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
           {properties.map(prop=>{
             const active=form.assignedProperties.includes(prop.id);
             return <button key={prop.id} onClick={()=>setForm(f=>({...f,assignedProperties:active?f.assignedProperties.filter(p=>p!==prop.id):[...f.assignedProperties,prop.id]}))} style={{padding:"4px 12px",borderRadius:20,border:`1.5px solid ${active?prop.color:C.border}`,background:active?prop.color+"18":"transparent",color:active?prop.color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>{prop.name}</button>;
           })}
         </div>
       </div>
       <div style={{display:"flex",gap:10}}><Btn onClick={add}>Add cleaner</Btn><Btn onClick={()=>setShowAdd(false)} secondary>Cancel</Btn></div>
     </div>
   </Modal>}
 </div>;
}

function CleanerPortal({cleaner,properties,cleans,setCleans,bookings,maintenance,setMaintenance,messages,setMessages,showToast,toast,onLogout}){

 const [msgText,setMsgText]=useState("");
 const mine=cleans.filter(c=>c.cleanerId===cleaner.id).sort((a,b)=>new Date(a.date)-new Date(b.date));
 const myProps=properties.filter(p=>(cleaner.assignedProperties||[]).includes(p.id));
 const myMessages=messages.filter(m=>(m.from==="manager"&&m.to===cleaner.id)||(m.from===cleaner.id&&m.to==="manager")).sort((a,b)=>new Date(a.date)-new Date(b.date));
 const unreadCount=messages.filter(m=>m.from==="manager"&&m.to===cleaner.id&&!m.read).length;

 function sendMsg(){
   if(!msgText.trim())return;
   setMessages(ms=>[...ms,{id:"msg"+Date.now(),from:cleaner.id,to:"manager",text:msgText,date:new Date(),read:false}]);
   setMsgText("");
   showToast("Message sent ✓");
 }

 function updateClean(id,updates){
   setCleans(cs=>cs.map(x=>x.id===id?{...x,...updates}:x));
 }

 function handlePhoto(cid,e){
   const file=e.target.files[0];if(!file)return;
   const reader=new FileReader();
   reader.onload=ev=>{
     setCleans(cs=>cs.map(x=>x.id===cid?{...x,photos:[...(x.photos||[]),ev.target.result]}:x));
     showToast("Photo added ✓");
   };
   reader.readAsDataURL(file);
 }

 function submitMaint(){
   if(!mForm.propertyId||!mForm.title)return;
   setMaintenance(ms=>[...ms,{...mForm,id:"m"+Date.now(),reportedBy:cleaner.id,date:new Date(),status:"open"}]);

 }

 return <div style={{minHeight:"100vh",background:C.bg}}>

     </div>
     <div style={{display:"flex",gap:8}}>

       <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",padding:"8px 12px",borderRadius:10,cursor:"pointer",fontSize:13}}>Log out</button>
     </div>
   </div>

   <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:C.surface}}>
     {["cleans","properties","messages"].map(t=><button key={t} onClick={()=>{setTab(t);if(t==="messages")setMessages(ms=>ms.map(m=>m.to===cleaner.id?{...m,read:true}:m));}} style={{flex:1,padding:"14px",border:"none",background:"transparent",fontWeight:tab===t?700:400,color:tab===t?C.navy:C.muted,fontSize:14,cursor:"pointer",borderBottom:tab===t?`2px solid ${C.navy}`:"2px solid transparent",position:"relative"}}>
       {t==="cleans"?"🧹 My Cleans":t==="properties"?"🏠 Properties":"💬 Messages"}
       {t==="messages"&&unreadCount>0&&<span style={{background:C.coral,color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 5px",marginLeft:4}}>{unreadCount}</span>}
     </button>)}
   </div>

   <div style={{padding:"20px 16px",maxWidth:600,margin:"0 auto"}}>
     {tab==="cleans"&&<>
       <div style={{display:"flex",gap:12,marginBottom:20}}>
         <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",textAlign:"center"}}>
           <div style={{fontSize:24,fontWeight:800,color:C.coral}}>{mine.filter(c=>c.status!=="complete").length}</div>
           <div style={{fontSize:12,color:C.textSoft}}>Pending</div>
         </div>
         <div style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"14px",textAlign:"center"}}>
           <div style={{fontSize:24,fontWeight:800,color:C.mint}}>{mine.filter(c=>c.status==="complete").length}</div>
           <div style={{fontSize:12,color:C.textSoft}}>Done</div>

       <div style={{display:"flex",flexDirection:"column",gap:12}}>

                     <div style={{width:16,height:16,borderRadius:4,background:c.checklist?.[item]?C.mint:C.border,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                       {c.checklist?.[item]&&<span style={{color:"#fff",fontSize:11}}>✓</span>}

                 </div>

                 <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:6}}>NOTES</div>

     {tab==="messages"&&<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>

 const [text,setText]=useState("");
 const [subTab,setSubTab]=useState("messages"); // messages | history

 const selCleaner=cleaners.find(c=>c.id===selId);
 const thread=messages.filter(m=>(m.to===selId&&m.from==="manager")||(m.from===selId&&m.to==="manager")).sort((a,b)=>new Date(a.date)-new Date(b.date));
 const cleanerCleans=cleans.filter(c=>c.cleanerId===selId).sort((a,b)=>new Date(b.date)-new Date(a.date));

 function send(){
   if(!text.trim()||!selId)return;
   setMessages(ms=>[...ms,{id:"msg"+Date.now(),from:"manager",to:selId,text,date:new Date(),read:true}]);
   setText("");
   showToast("Message sent ✓");
 }

         <div style={{fontSize:12,color:C.muted}}>{selCleaner?.phone} · PIN: {selCleaner?.pin}</div>
       </div>
       <div style={{display:"flex",gap:4,background:C.bg,borderRadius:10,padding:4}}>
         {["messages","history"].map(t=><button key={t} onClick={()=>setSubTab(t)} style={{padding:"6px 14px",borderRadius:8,border:"none",fontSize:13,fontWeight:600,background:subTab===t?C.surface:"transparent",color:subTab===t?C.text:C.muted,cursor:"pointer"}}>{t==="messages"?"💬 Chat":"📋 Clean History"}</button>)}
       </div>
     </div>

     {subTab==="messages"&&<>
       {/* Messages */}
       <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
         {thread.length===0&&<div style={{textAlign:"center",color:C.muted,marginTop:60}}>No messages yet — say hi 👋</div>}
         {thread.map(m=>{
           const isMe=m.from==="manager";
           return <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start"}}>
             <div style={{fontSize:11,color:C.muted,marginBottom:3}}>{isMe?"You":selCleaner?.name} · {new Date(m.date).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>
             <div style={{background:isMe?C.navy:"#F0F0F5",color:isMe?"#fff":C.text,borderRadius:isMe?"14px 14px 4px 14px":"14px 14px 14px 4px",padding:"10px 14px",maxWidth:"70%",fontSize:14,lineHeight:1.5}}>{m.text}</div>
           </div>;
         })}
       </div>
       {/* Input */}
       <div style={{padding:12,borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
         <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={`Message ${selCleaner?.name}...`} style={{flex:1,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,outline:"none"}}/>
         <Btn onClick={send}>Send</Btn>
       </div>
     </>}

     {subTab==="history"&&<div style={{flex:1,overflowY:"auto",padding:16}}>
       {cleanerCleans.length===0&&<div style={{textAlign:"center",color:C.muted,marginTop:60}}>No cleans yet</div>}
       <div style={{display:"flex",flexDirection:"column",gap:14}}>
         {cleanerCleans.map(c=>{
           const prop=properties.find(p=>p.id===c.propertyId);
           const bk=bookings.find(b=>b.id===c.bookingId);
           const done=Object.values(c.checklist||{}).filter(Boolean).length;
           return <div key={c.id} style={{background:C.bg,borderRadius:12,padding:"14px 16px",border:`1px solid ${c.status==="complete"?C.mint:C.border}`}}>
             <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
               <div>
                 <div style={{fontWeight:700,fontSize:14}}>{prop?.name}</div>
                 <div style={{fontSize:13,color:C.textSoft}}>{fmt(c.date)}{bk?" · after "+bk.guest:""}</div>
               </div>
               <span style={pill(c.status)}>{c.status}</span>
             </div>
             {/* Checklist summary */}
             {done>0&&<div style={{fontSize:12,color:C.mint,marginBottom:8}}>✓ {done}/{CHECKLIST_ITEMS.length} tasks completed</div>}
             {/* Notes */}
             {c.notes&&<div style={{fontSize:13,color:C.textSoft,background:C.surface,borderRadius:8,padding:"8px 10px",marginBottom:8}}>📝 {c.notes}</div>}
             {/* Photos */}
             {c.photos?.length>0&&<div>
               <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6}}>PHOTOS</div>
               <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                 {c.photos.map((ph,i)=><img key={i} src={ph} alt="clean photo" style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:`1px solid ${C.border}`}}/>)}
               </div>
             </div>}
             {!c.photos?.length&&c.status==="complete"&&<div style={{fontSize:12,color:C.muted}}>No photos uploaded</div>}
           </div>;
         })}
       </div>
     </div>}
   </div>
 </div>;
}

// ── APP ROOT ───────────────────────────────────────────────────────────────────
function App(){
 const [role,setRole]=useState(null);
 const [cleaner,setCleaner]=useState(null);
 const [properties,setProperties]=useState(()=>load("properties",[]));
 const [cleaners,setCleaners]=useState(()=>load("cleaners",[]));
 const [bookings,setBookings]=useState(()=>load("bookings",[]));
 const [cleans,setCleans]=useState(()=>load("cleans",[]));
 const [earnings,setEarnings]=useState(()=>load("earnings",[]));
 const [expenses,setExpenses]=useState(()=>load("expenses",[]));
 const [maintenance,setMaintenance]=useState(()=>load("maintenance",[]));
 const [messages,setMessages]=useState(()=>load("messages",[]));
 const [tab,setTab]=useState("diary");
 const [toast,setToast]=useState(null);

 useEffect(()=>save("properties",properties),[properties]);
 useEffect(()=>save("cleaners",cleaners),[cleaners]);
 useEffect(()=>save("bookings",bookings),[bookings]);
 useEffect(()=>save("cleans",cleans),[cleans]);
 useEffect(()=>save("earnings",earnings),[earnings]);
 useEffect(()=>save("expenses",expenses),[expenses]);
 useEffect(()=>save("maintenance",maintenance),[maintenance]);
 useEffect(()=>save("messages",messages),[messages]);

 function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3000);}

 const openMaintenance=maintenance.filter(m=>m.status==="open").length;
 const unreadMessages=messages.filter(m=>m.from!=="manager"&&!m.read).length;

 if(!role) return <Login cleaners={cleaners} setRole={setRole} setCleaner={setCleaner}/>;
 if(role==="cleaner") return <CleanerPortal cleaner={cleaner} properties={properties} cleans={cleans} setCleans={setCleans} bookings={bookings} maintenance={maintenance} setMaintenance={setMaintenance} messages={messages} setMessages={setMessages} showToast={showToast} toast={toast} onLogout={()=>{setRole(null);setCleaner(null);}}/>;

 return <div style={{minHeight:"100vh",background:C.bg}}>
   {toast&&<Toast msg={toast.msg} type={toast.type}/>}
   <Sidebar tab={tab} setTab={setTab} onLogout={()=>setRole(null)} maintenanceCount={openMaintenance} unreadCount={unreadMessages}/>
   <div style={{marginLeft:200,padding:"28px 32px",maxWidth:tab==="messages"?1200:1080}}>
     {tab==="diary"       && <DiaryView       properties={properties} bookings={bookings} setBookings={setBookings} cleans={cleans} setCleans={setCleans} cleaners={cleaners} showToast={showToast}/>}
     {tab==="cleans"      && <CleansView      cleans={cleans} setCleans={setCleans} properties={properties} cleaners={cleaners} bookings={bookings} showToast={showToast}/>}
     {tab==="occupancy"   && <OccupancyView   properties={properties} bookings={bookings}/>}
     {tab==="earnings"    && <EarningsView    properties={properties} earnings={earnings} setEarnings={setEarnings} showToast={showToast}/>}
     {tab==="expenses"    && <ExpensesView    properties={properties} expenses={expenses} setExpenses={setExpenses} showToast={showToast}/>}
     {tab==="properties"  && <PropertiesView  properties={properties} setProperties={setProperties} showToast={showToast}/>}
     {tab==="team"        && <TeamView        cleaners={cleaners} setCleaners={setCleaners} properties={properties} showToast={showToast}/>}
     {tab==="maintenance" && <MaintenanceView maintenance={maintenance} setMaintenance={setMaintenance} properties={properties} showToast={showToast}/>}
     {tab==="messages"    && <MessagesView    messages={messages} setMessages={setMessages} cleaners={cleaners} cleans={cleans} properties={properties} bookings={bookings} showToast={showToast}/>}
   </div>
 </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
